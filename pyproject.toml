[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name="cnsistent"
version="0.3"
authors=[
	{name="Adam Streck", email="adam.streck@gmail.com"}
]
maintainers=[
	{name="Adam Streck", email="adam.streck@gmail.com"}
]
description="Tools for impuation, segmentation, binning, and plotting of Copy Number Segments (CNS)."
readme="README.md"
license={text="MIT"}
requires-python = ">=3.9"


[project.scripts]
cnsistent="cnsistent:main"

[tool.hatch.build.targets.wheel]
include = ["cnsistent.py", "cns/**/*.py", "README.md", "docs/**"]
